<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - BOOK Journal</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet"> 

    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <img src="../recursos/Imagen2.png" class="side-image left" alt="Libros">

    <div class="container-login">
        <h1 class="main-title">
            <span class="font-patrick">Book</span> 
            <span class="font-dancing">Journal</span>
        </h1>

        <div class="login-card">
            <h2>Iniciar sesión</h2>

            <input type="email" id="user" placeholder="Correo o Usuario">
            <input type="password" id="pass" placeholder="Contraseña">

            <button onclick="login()">Ingresar</button>
            <button class="btn-reg" onclick="irARegistro()">Registrarse</button>
        </div>
    </div>

    <img src="../recursos/Imagen2.png" class="side-image right" alt="Libros">
    <script src="../java-script/login.js"></script>

</body>
</html>
